<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Land Claim Viewer</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:        #0F2438;
    --panel:     #16324A;
    --panel-2:   #1C3E59;
    --grid:      #2C5570;
    --ink:       #E7EEF2;
    --ink-dim:   #9FB4C4;
    --amber:     #E8A33D;
    --green:     #6FAE8C;
    --border:    #3E6E8E;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;width:100%;margin:0;overflow:hidden;background:var(--bg);color:var(--ink);
    font-family:'IBM Plex Sans',sans-serif;}
  .app{display:flex;height:100vh;width:100vw;overflow:hidden;}

  /* ---- Sidebar: question list ---- */
  .sidebar{width:300px;min-width:300px;background:var(--panel);
    border-right:1px solid var(--border);display:flex;flex-direction:column;}
  .brand{padding:20px 20px 14px;border-bottom:1px solid var(--grid);}
  .brand h1{font-family:'Space Grotesk',sans-serif;font-size:17px;margin:0 0 3px;
    letter-spacing:.3px;}
  .brand p{margin:0;font-size:12px;color:var(--ink-dim);}
  .questions{flex:1;overflow-y:auto;padding:10px;}
  .q-item{display:flex;gap:12px;padding:12px;border-radius:6px;cursor:pointer;
    margin-bottom:6px;border:1px solid transparent;transition:background .15s;}
  .q-item:hover{background:var(--panel-2);}
  .q-item.active{background:var(--panel-2);border-color:var(--amber);}
  .q-num{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--amber);
    min-width:22px;padding-top:2px;}
  .q-text{font-size:13px;line-height:1.4;}
  .q-desc{font-size:10.5px;line-height:1.35;color:var(--ink-dim);margin-top:4px;}
  .q-status{font-size:10px;color:var(--green);text-transform:uppercase;
    letter-spacing:.5px;margin-top:4px;display:block;}

  /* ---- Map ---- */
  .map-wrap{flex:1;position:relative;}
  #map{height:100%;width:100%;background:#0a1a28;}
  .leaflet-container{background:#0a1a28;}

  .map-topbar{position:absolute;top:14px;left:14px;z-index:500;
    background:rgba(15,36,56,.92);border:1px solid var(--border);border-radius:6px;
    padding:10px 34px 10px 14px;max-width:420px;}
  .topbar-close{position:absolute;top:8px;right:8px;background:none;border:none;
    color:var(--ink-dim);font-size:15px;cursor:pointer;line-height:1;padding:4px;}
  .topbar-close:hover{color:var(--ink);}
  .map-topbar h2{font-family:'Space Grotesk',sans-serif;font-size:14px;margin:0 0 4px;}
  .map-topbar p{font-size:12px;color:var(--ink-dim);margin:0 0 8px;}
  .map-topbar a.doc-link{font-size:12px;color:var(--amber);text-decoration:none;
    border:1px solid var(--amber);padding:4px 8px;border-radius:4px;display:inline-block;}
  .map-topbar a.doc-link:hover{background:var(--amber);color:var(--bg);}

  /* ---- Parcel dossier panel (signature element: diagram plate) ---- */
  .dossier{position:absolute;top:0;right:0;height:100%;width:340px;
    background:var(--panel);border-left:1px solid var(--border);
    transform:translateX(100%);transition:transform .25s ease;z-index:600;
    overflow-y:auto;}
  .dossier.open{transform:translateX(0);}
  .plate{margin:16px;border:1px solid var(--border);position:relative;padding:18px;}
  .plate::before,.plate::after,.plate .tick-tl,.plate .tick-br{content:"";
    position:absolute;width:10px;height:10px;border:1px solid var(--amber);}
  .plate::before{top:-1px;left:-1px;border-right:none;border-bottom:none;}
  .plate::after{bottom:-1px;right:-1px;border-left:none;border-top:none;}
  .plate-close{position:absolute;top:10px;right:14px;background:none;border:none;
    color:var(--ink-dim);font-size:18px;cursor:pointer;}
  .plate-id{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--amber);
    letter-spacing:.5px;margin:0 0 2px;}
  .plate-title{font-family:'Space Grotesk',sans-serif;font-size:16px;margin:0 0 16px;}
  .plate-row{display:flex;justify-content:space-between;padding:7px 0;
    border-bottom:1px dashed var(--grid);font-size:13px;}
  .plate-row span:first-child{color:var(--ink-dim);}
  .plate-row span:last-child{font-family:'IBM Plex Mono',monospace;font-size:12px;}
  .plate-actions{margin-top:18px;display:flex;flex-direction:column;gap:8px;}
  .plate-actions a{text-align:center;padding:9px;border-radius:4px;font-size:12px;
    text-decoration:none;font-weight:500;}
  .btn-sg{background:var(--amber);color:var(--bg);}
  .btn-sg:hover{opacity:.9;}
  .btn-secondary{border:1px solid var(--border);color:var(--ink);}
  .btn-secondary:hover{background:var(--panel-2);}

  .parcel-fill{fill:#1C3E59;fill-opacity:.5;stroke:#5B8AA6;stroke-width:1;}
  .parcel-fill.selected{fill:var(--amber);fill-opacity:.35;stroke:var(--amber);stroke-width:2;}

  /* year drill-down buttons */
  .year-btn{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--amber);
    background:rgba(15,36,56,.6);border:1px solid var(--amber);padding:4px 9px;
    border-radius:4px;cursor:pointer;transition:all .12s;}
  .year-btn:hover{background:var(--amber);color:var(--bg);}
  .year-btn-active{background:#E4572E;border-color:#E4572E;color:#fff;}
  .year-btn-warn{border-color:#B9762E;color:#D79A5B;}

  /* graveyard point markers (actual locations, from gpkg "Graveyard Location" layer).
     NB: do NOT set position here — Leaflet's own .leaflet-marker-icon rule already
     sets position:absolute on this same element (that's what makes its transform-
     based lat/lng placement work). Overriding it to relative put every marker back
     into normal document flow, so markers stacked downward in DOM order on top of
     their correct transform offset — invisible at high zoom (real-world spacing
     dwarfs the stacking offset) but a visible "trail" once zoomed out far enough
     that markers converge on nearly the same pixel. */
  .graveyard-cross{width:16px;height:16px;pointer-events:none;}
  .graveyard-cross::before,.graveyard-cross::after{content:"";position:absolute;
    background:#E4372E;border:1px solid #6E140B;}
  .graveyard-cross::before{left:6px;top:0;width:4px;height:16px;}
  .graveyard-cross::after{left:0;top:6px;width:16px;height:4px;}

  /* beneficiary property number badges (same position:absolute caveat as above) */
  .benef-num{width:18px;height:18px;border-radius:50%;background:#F2A63A;color:#0F2438;
    font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;
    display:flex;align-items:center;justify-content:center;pointer-events:none;
    border:1px solid #B9762E;}

  /* ---- Chat assistant: local Q&A over the claim data already on this page ---- */
  .chat-fab{position:absolute;bottom:16px;left:16px;z-index:700;width:46px;height:46px;
    border-radius:50%;background:var(--amber);color:var(--bg);border:none;cursor:pointer;
    font-size:20px;box-shadow:0 2px 8px rgba(0,0,0,.4);display:flex;align-items:center;
    justify-content:center;}
  .chat-fab:hover{opacity:.9;}
  .chat-panel{position:absolute;bottom:16px;left:16px;z-index:700;width:360px;
    max-width:calc(100vw - 32px);height:480px;max-height:calc(100vh - 32px);
    background:var(--panel);border:1px solid var(--border);border-radius:8px;
    display:none;flex-direction:column;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.5);}
  .chat-panel.open{display:flex;}
  .chat-header{padding:10px 12px;border-bottom:1px solid var(--grid);display:flex;
    align-items:center;justify-content:space-between;background:var(--panel-2);}
  .chat-header h3{margin:0;font-family:'Space Grotesk',sans-serif;font-size:13px;}
  .chat-header p{margin:2px 0 0;font-size:10.5px;color:var(--ink-dim);}
  .chat-close{background:none;border:none;color:var(--ink-dim);font-size:16px;cursor:pointer;}
  .chat-close:hover{color:var(--ink);}
  .chat-messages{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px;}
  .chat-msg{display:flex;}
  .chat-msg-user{justify-content:flex-end;}
  .chat-bubble{max-width:88%;padding:8px 10px;border-radius:8px;font-size:12.5px;
    line-height:1.4;white-space:pre-wrap;}
  .chat-msg-bot .chat-bubble{background:var(--panel-2);border:1px solid var(--grid);}
  .chat-msg-user .chat-bubble{background:var(--amber);color:var(--bg);}
  .chat-chips{display:flex;flex-wrap:wrap;gap:6px;margin:2px 0 0 0;}
  .chat-chip{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--amber);
    background:rgba(15,36,56,.6);border:1px solid var(--amber);padding:3px 8px;
    border-radius:4px;cursor:pointer;}
  .chat-chip:hover{background:var(--amber);color:var(--bg);}
  .chat-input-row{display:flex;gap:6px;padding:10px;border-top:1px solid var(--grid);}
  .chat-input-row input{flex:1;background:var(--bg);border:1px solid var(--border);
    border-radius:4px;color:var(--ink);padding:8px;font-size:12.5px;font-family:inherit;}
  .chat-input-row input:focus{outline:1px solid var(--amber);}
  .chat-input-row button{background:var(--amber);color:var(--bg);border:none;
    border-radius:4px;padding:8px 12px;font-size:12.5px;font-weight:500;cursor:pointer;}
  .chat-input-row button:hover{opacity:.9;}

  /* map labels over satellite imagery */
  .portion-label{font-family:'IBM Plex Mono',monospace;font-size:10px;color:#fff;
    text-align:center;white-space:nowrap;font-weight:600;pointer-events:none;
    text-shadow:-1px -1px 0 #000,1px -1px 0 #000,-1px 1px 0 #000,1px 1px 0 #000,
      0 0 4px rgba(0,0,0,.8);}
  .farm-label{font-family:'Space Grotesk',sans-serif;font-size:11px;color:#FFE9C7;
    text-align:center;white-space:nowrap;font-weight:700;letter-spacing:.3px;
    text-transform:uppercase;pointer-events:none;
    text-shadow:-1.5px -1.5px 0 #000,1.5px -1.5px 0 #000,-1.5px 1.5px 0 #000,1.5px 1.5px 0 #000,
      0 0 5px rgba(0,0,0,.85);}
</style>
</head>
<body>
<div class="app">

  <!-- SIDEBAR: claim questions -->
  <div class="sidebar">
    <div class="brand">
      <h1>Land Claim Viewer</h1>
      <p>Reference dossier &amp; portion registry</p>
    </div>
    <div class="questions" id="questionList"></div>
  </div>

  <!-- MAP -->
  <div class="map-wrap">
    <div class="map-topbar" id="topbar" style="display:none;">
      <button class="topbar-close" id="topbarClose" title="Clear selection">✕</button>
      <h2 id="topbarTitle"></h2>
      <p id="topbarDesc"></p>
      <a class="doc-link" id="topbarDoc" href="#" target="_blank" rel="noopener">View reference map (PDF)</a>
    </div>
    <div id="map"></div>

    <!-- DOSSIER: opens when a parcel is clicked -->
    <div class="dossier" id="dossier">
      <div class="plate">
        <button class="plate-close" onclick="closeDossier()">✕</button>
        <div class="tick-tl"></div><div class="tick-br"></div>
        <p class="plate-id" id="plateId">PORTION —</p>
        <h3 class="plate-title" id="plateTitle">—</h3>
        <div id="plateRows"></div>
        <div class="plate-actions">
          <a class="btn-sg" id="sgLink" href="#" target="_blank" rel="noopener">Open SG Diagram (PDF)</a>
          <a class="btn-secondary" id="extraLink" href="#" target="_blank" rel="noopener" style="display:none;">Additional document</a>
        </div>
      </div>
    </div>

    <!-- CHAT ASSISTANT: local Q&A over the questions/portions already loaded -->
    <button class="chat-fab" id="chatFab" title="Ask about this claim">💬</button>
    <div class="chat-panel" id="chatPanel">
      <div class="chat-header">
        <div>
          <h3>Claim Assistant</h3>
          <p>Answers from the loaded trigger questions &amp; portion registry</p>
        </div>
        <button class="chat-close" id="chatClose">✕</button>
      </div>
      <div class="chat-messages" id="chatMessages"></div>
      <form class="chat-input-row" id="chatForm">
        <input type="text" id="chatInput" placeholder='e.g. "portion 12" or "graveyards"' autocomplete="off">
        <button type="submit">Send</button>
      </form>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

// project). The static maps' hatch actually just highlights the SAME farm

// styled to look like the reference maps instead of plain yellow.
const HATCH_COLORS = { purple:'#B266FF', orange:'#FF8C42', teal:'#3FD6C4', red:'#E4372E', green:'#4CAF50', magenta:'#CC3FCC', olive:'#C7D96B' };
function ensureHatchDefs(){
  const svg = map.getPanes().overlayPane.querySelector('svg');
  if(!svg || svg.querySelector('#hatch-defs')) return;
  const defs = document.createElementNS('http://www.w3.org/2000/svg','defs');
  defs.id = 'hatch-defs';
  Object.entries(HATCH_COLORS).forEach(([name, color]) => {
      const p = document.createElementNS('http://www.w3.org/2000/svg','pattern');
      p.setAttribute('id', 'hatch-' + name);
      p.setAttribute('width', '8'); p.setAttribute('height', '8');
      p.setAttribute('patternUnits', 'userSpaceOnUse');
      p.setAttribute('patternTransform', 'rotate(45)');
      const stripe = document.createElementNS('http://www.w3.org/2000/svg','rect');
      stripe.setAttribute('width','4'); stripe.setAttribute('height','8');
      stripe.setAttribute('fill', color); stripe.setAttribute('fill-opacity','0.6');
      p.appendChild(stripe);
      defs.appendChild(p);
    });
  svg.appendChild(defs);
}
function hatchStyle(colorName){
  return { color: HATCH_COLORS[colorName], weight:2.5, fillColor:'url(#hatch-' + colorName + ')', fillOpacity:1 };
}

function baseStyleFor(props){

function centroidOf(latlngs){
  // rough centroid of a ring array (array of L.LatLng)
  let x=0,y=0,n=0;
  latlngs.forEach(p=>{ x+=p.lat; y+=p.lng; n++; });
  return n ? [x/n, y/n] : null;
}

function renderParcels(geojson){
  PARCEL_FEATURES = geojson.features || [];
  parcelLayer = L.geoJSON(geojson, {
    style: (feature) => baseStyleFor(feature.properties),
    onEachFeature: (feature, layer) => {
      const lpi = feature.properties.lpi_id;
      if(lpi){ (layersByLpi[lpi] = layersByLpi[lpi] || []).push(layer); }
      layer.on('click', () => openDossier(feature.properties, layer));
      layer._baseStyle = baseStyleFor(feature.properties);
    }
  }).addTo(map);
  try{ map.fitBounds(parcelLayer.getBounds(), { padding:[40,40] }); }catch(e){}
  ensureHatchDefs();

  addLabels(geojson);
}

// ---- Labels: one farm-name per farm (at the farm's combined centre) + a
//      portion number on every parcel, echoing the SG map style ----
function addLabels(geojson){
  portionLabelLayer = L.layerGroup();
  const farmGroups = {};

  // Group features by lpi_id so multi-fragment parcels get ONE label on their
  // largest piece (rather than none, or three overlapping ones).
  const byKey = {};
  geojson.features.forEach(f => {
    const id = f.properties.lpi_id;
    (byKey[id] = byKey[id] || []).push(f);
  });

  function featureCentreAndSize(f){
    // returns [centerLatLng, approxSize] from the geometry rings
    const pts = [];
    (function walk(c){
      if(typeof c[0] === 'number'){ pts.push(c); }
      else c.forEach(walk);
    })(f.geometry.coordinates);
    if(!pts.length) return null;
    let lon=0, lat=0, minx=1e9,maxx=-1e9,miny=1e9,maxy=-1e9;
    pts.forEach(p=>{ lon+=p[0]; lat+=p[1];
      minx=Math.min(minx,p[0]); maxx=Math.max(maxx,p[0]);
      miny=Math.min(miny,p[1]); maxy=Math.max(maxy,p[1]); });
    const size=(maxx-minx)*(maxy-miny);
    return [[lat/pts.length, lon/pts.length], size];
  }

  Object.entries(byKey).forEach(([id, feats]) => {
    const p = feats[0].properties;

    // Portion label: use the TEXT field only for the Ptn/Rem prefix, but the
    // NUMBER always comes from the authoritative 21-digit key (last 5 digits),
    // never from the text field. The text's number is unreliable — at least
    // one Umsinsini fragment is mislabeled "Re 0" in text while its real key
    // is ...00002 (i.e. Rem 2). Trusting the text number silently mislabels
    // and misplaces portions.
    let raw = (p.portion_number || '').trim();
    const keyNum = parseInt(id.slice(-5), 10);
    const isRemainder = /^re\b/i.test(raw) || /^rem/i.test(raw);
    let label = isRemainder ? `Rem ${keyNum}` : (raw ? `Ptn ${keyNum}` : '');

    // choose the largest fragment for placement
    let best=null, bestSize=-1, allCenters=[];
    feats.forEach(f=>{
      const r=featureCentreAndSize(f);
      if(!r) return;
      allCenters.push(r[0]);
      if(r[1]>bestSize){ bestSize=r[1]; best=r[0]; }
    });

    if(label && best){
      L.marker(best, { interactive:false, icon: L.divIcon({
        className:'portion-label', html:label,
        iconSize:[40,14], iconAnchor:[20,-4]   // anchored below the point
      })}).addTo(portionLabelLayer);
    }

    const fn = (p.farm_name||'').replace(/\s+ET$/,'').trim();
    if(best) (farmGroups[fn] = farmGroups[fn] || []).push({lat:best[0], lng:best[1]});
  });

  farmLabelLayer = L.layerGroup();
  Object.entries(farmGroups).forEach(([fn, centers]) => {
    if(!fn) return;
    const ctr = centroidOf(centers);
    if(!ctr) return;
    L.marker(ctr, { interactive:false, icon: L.divIcon({
      className:'farm-label', html:fn,
      iconSize:[140,16], iconAnchor:[70,20]   // anchored above the point
    })}).addTo(farmLabelLayer);
  });

  farmLabelLayer.addTo(map);
  portionLabelLayer.addTo(map);

  function toggleLabels(){
    const z = map.getZoom();
    if(z >= 14){ if(!map.hasLayer(portionLabelLayer)) portionLabelLayer.addTo(map); }
    else { if(map.hasLayer(portionLabelLayer)) map.removeLayer(portionLabelLayer); }
    declutter();
  }

  // Hide any label whose on-screen box overlaps one already placed (checked
  // across BOTH farm and portion labels together, so a farm name never sits
  // on top of a portion number either — the exact bug seen on single-parcel
  // farms like Kloofend, where both labels land on the same point).
  function declutter(){
    const placed = [];
    const allMarkers = [];
    farmLabelLayer.eachLayer(m => allMarkers.push({m, kind:'farm'}));
    portionLabelLayer.eachLayer(m => allMarkers.push({m, kind:'portion'}));
    // farm labels take priority (checked first) since losing a portion number
    // is less costly than losing the farm name
    allMarkers.sort((a,b) => (a.kind==='farm'?0:1) - (b.kind==='farm'?0:1));

    allMarkers.forEach(({m}) => {
      const el = m.getElement();
      if(!el) return;
      el.style.visibility = 'visible';
      const pt = map.latLngToContainerPoint(m.getLatLng());
      const w = el.offsetWidth || 60, h = el.offsetHeight || 16;
      const box = { x1:pt.x-w/2, x2:pt.x+w/2, y1:pt.y-h/2, y2:pt.y+h/2 };
      const collides = placed.some(b => box.x1 < b.x2 && box.x2 > b.x1 && box.y1 < b.y2 && box.y2 > b.y1);
      if(collides){ el.style.visibility = 'hidden'; }
      else { placed.push(box); }
    });
  }
  map.on('zoomend moveend', declutter);
  map.on('zoomend', toggleLabels);
  toggleLabels();
}

// Try to load a real exported file first; fall back to the sample data.
fetch('data/parcels.geojson')
  .then(r => { if(!r.ok) throw 0; return r.json(); })
  .then(renderParcels)
  .catch(() => renderParcels(SAMPLE_PARCELS));

function restyle(layer){
  // restore a layer to its state: selected > highlight > base
  if(layer._selected){ layer.setStyle(SELECT_STYLE); return; }
  layer.setStyle(layer._hl || layer._baseStyle || BASE_STYLE);
}

let selectedLayers = [];
function openDossier(props, layer){
  // restore previously selected fragments
  selectedLayers.forEach(l => { l._selected=false; restyle(l); });
  selectedLayers = [];
  // select ALL fragments sharing this parcel key
  const arr = layersByLpi[props.lpi_id] || [layer];
  arr.forEach(l => { l._selected=true; l.setStyle(SELECT_STYLE); });
  selectedLayers = arr;
  selectedLayer = arr[0];

  document.getElementById('plateId').textContent = props.lpi_id || props.prcl_key || '—';
  document.getElementById('plateTitle').textContent = props.portion_id || props.farm_name || 'Untitled portion';

  const rows = document.getElementById('plateRows');
  rows.innerHTML = '';
  const areaHa = props.area_m2 ? (props.area_m2 / 10000).toFixed(2) + ' ha' : '—';
  const fields = [
    ['Status', props.status],
    ['Current owner', props.current_owner],
    ['Owner type', props.owner_type],
    ['Title deed', props.title_deed],
    ['Deed of transfer', props.deed_of_transfer],
    ['Area', areaHa],
    ['Beneficiary properties', props.n_properties],
  ];
  fields.forEach(([label, val]) => {
    const row = document.createElement('div');
    row.className = 'plate-row';
    row.innerHTML = `<span>${label}</span><span>${val ?? '—'}</span>`;
    rows.appendChild(row);
  });

  const sg = document.getElementById('sgLink');
  if(props.sg_pdf){ sg.style.display='block'; sg.style.opacity='1'; sg.style.pointerEvents='auto'; sg.href = props.sg_pdf; sg.textContent='Open SG Diagram (PDF)'; }
  else{ sg.style.display='block'; sg.style.opacity='.5'; sg.style.pointerEvents='none'; sg.textContent='SG Diagram not linked yet'; sg.href='#'; }
  const extra = document.getElementById('extraLink');
  if(props.extra_doc){ extra.style.display='block'; extra.href = props.extra_doc; }
  else{ extra.style.display='none'; }

  document.getElementById('dossier').classList.add('open');
}
function closeDossier(){
  document.getElementById('dossier').classList.remove('open');
  selectedLayers.forEach(l => { l._selected=false; restyle(l); });
  selectedLayers = []; selectedLayer = null;
}

// Build the question sidebar
const qList = document.getElementById('questionList');
QUESTIONS.forEach((q, i) => {
  const el = document.createElement('div');
  el.className = 'q-item';
  el.dataset.qid = q.id;
  const tag = q.trigger ? `<span class="q-num">${q.trigger}</span>` : `<span class="q-num">${String(i+1).padStart(2,'0')}</span>`;
  el.innerHTML = `${tag}
    <div><div class="q-text">${q.title}</div>
    ${q.desc ? `<div class="q-desc">${q.desc}</div>` : ''}
    <span class="q-status">${q.maps.length} map${q.maps.length>1?'s':''} available</span></div>`;
  el.addEventListener('click', () => {
    if(el.classList.contains('active')){
      // clicking the active question again deselects it
      el.classList.remove('active');
      deselectQuestion();
    } else {
      document.querySelectorAll('.q-item').forEach(n=>n.classList.remove('active'));
      el.classList.add('active');
      showQuestion(q);
    }
  });
  qList.appendChild(el);
});

function deselectQuestion(){
  activeQuestion = null;
  clearHighlights();
  document.getElementById('topbar').style.display = 'none';
  const row = document.getElementById('topbarMulti');
  if(row){ row.innerHTML=''; row.style.display='none'; }
  const link = document.getElementById('staticMapLink');
  if(link) link.style.display = 'none';
  if(map.hasLayer(graveyardLayer)) map.removeLayer(graveyardLayer);
  if(map.hasLayer(beneficiaryLayer)) map.removeLayer(beneficiaryLayer);
  if(map.hasLayer(cultivatedLayer)) map.removeLayer(cultivatedLayer);
  if(map.hasLayer(occupationLayer)) map.removeLayer(occupationLayer);
  if(map.hasLayer(grazingLayer)) map.removeLayer(grazingLayer);
  if(map.hasLayer(accessRoutesLayer)) map.removeLayer(accessRoutesLayer);
}
document.getElementById('topbarClose').addEventListener('click', () => {
  document.querySelectorAll('.q-item').forEach(n=>n.classList.remove('active'));
  deselectQuestion();
});

// ---- Highlighting ----
function clearHighlights(){
  Object.values(layersByLpi).forEach(arr => arr.forEach(l => {
    l._hl = null; if(!l._selected) restyle(l);
  }));
}
function highlight(ids, style){
  (ids||[]).forEach(id => {
    const arr = layersByLpi[id];
    if(arr) arr.forEach(l => { l._hl = style; if(!l._selected) l.setStyle(style); });
  });
}
function unionPortions(q){
  const set = new Set();
  q.maps.forEach(m => (MAP_PORTIONS[m.file]||[]).forEach(id => set.add(id)));
  return [...set];
}

let activeQuestion = null;
function showQuestion(q){
  activeQuestion = q;
  const bar = document.getElementById('topbar');
  bar.style.display = 'block';
  document.getElementById('topbarTitle').textContent = q.title;

  // Highlight the union of all this question's portions — hatch-fill for the
  // community-claim/trust questions (matching the static maps' legend, split
  // into sub-color groups where the reference map does), plain yellow
  // otherwise.
  clearHighlights();
  if(q.id === 'a4_trust_state'){
    applyOwnershipChoropleth();
  } else if(q.id === 'a1_occupation_cultivation' || q.id === 'grazing_access'){
    // handled below by cultivatedLayer/occupationLayer/grazingLayer/
    // accessRoutesLayer — no portion wash, matching the reference maps
    // (which show no yellow fill, just the actual footprints/routes over
    // the plain parcel outlines).
  } else if(QUESTION_SUBGROUPS[q.id]){
    QUESTION_SUBGROUPS[q.id].forEach(group => highlight(group.ids, group.style));
  } else {
    highlight(unionPortions(q), YELLOW_STYLE);
  }

  // Graveyard question: show actual site locations (from the gpkg), not just
  // portion highlighting.
  if(q.id === 'a2_graveyards'){ graveyardLayer.addTo(map); }
  else if(map.hasLayer(graveyardLayer)){ map.removeLayer(graveyardLayer); }

  // Beneficiary question: show the actual 6 numbered house footprints (from
  // the gpkg), not just Longwood Remainder highlighted.
  if(q.id === 'beneficiary'){ beneficiaryLayer.addTo(map); }
  else if(map.hasLayer(beneficiaryLayer)){ map.removeLayer(beneficiaryLayer); }

  // A1 question: show actual cultivated-field footprints (from the gpkg),
  // not just a portion highlight.
  if(q.id === 'a1_occupation_cultivation'){ cultivatedLayer.addTo(map); }
  else if(map.hasLayer(cultivatedLayer)){ map.removeLayer(cultivatedLayer); }

  // Land occupation footprints are shared between A1 (cultivation) and the
  // grazing/access question — both reference maps use the same 3 occupation
  // categories (commercial farmhouse / informal homesteads / school).
  if(q.id === 'a1_occupation_cultivation' || q.id === 'grazing_access'){ occupationLayer.addTo(map); }
  else if(map.hasLayer(occupationLayer)){ map.removeLayer(occupationLayer); }

  // Grazing/access question: show the actual modelled grazing area + digitized
  // access routes/footpaths (from the gpkg) — the buffering/exclusion
  // methodology on the static map's notes panel was already run by the
  // surveyor and baked into these layers, not something to reproduce here.
  if(q.id === 'grazing_access'){ grazingLayer.addTo(map); accessRoutesLayer.addTo(map); }
  else {
    if(map.hasLayer(grazingLayer)) map.removeLayer(grazingLayer);
    if(map.hasLayer(accessRoutesLayer)) map.removeLayer(accessRoutesLayer);
  }

  const nUnion = unionPortions(q).length;
  const countMsg = q.id === 'a2_graveyards'
      ? `${nUnion} portions affected (highlighted yellow); ${graveyardLayer.getLayers().length} actual grave/burial-site locations marked (red crosses).`
      : q.id === 'a4_trust_state'
      ? `All farm portions colored by ownership category — ${Object.entries(OWNER_TYPE_COLORS).map(([k])=>k).join(', ')} — matching the reference map's legend. ${nUnion} portions specifically trigger A4 (inside/contiguous with trust or government ownership).`
      : q.id === 'beneficiary'
      ? `${beneficiaryCount} numbered beneficiary house footprints shown on the Remainder of Longwood, matching the reference map's inset.`
      : q.id === 'a1_occupation_cultivation'
      ? `Actual cultivated-field footprints (green = commercial, yellow = informal) and occupation footprints (green hatch = commercial farmhouse, magenta hatch = informal homesteads/buildings, blue = school) shown, matching the reference map's legend.`
      : q.id === 'grazing_access'
      ? `Modelled potential grazing area (olive hatch), ${accessRoutesCount} access route/footpath segments, and land occupation footprints shown, matching the reference map's legend.`
      : QUESTION_SUBGROUPS[q.id]
      ? QUESTION_SUBGROUPS[q.id].map(g => {
          const name = Object.keys(HATCH_COLORS).find(n => HATCH_COLORS[n] === g.style.color);
          return `${g.ids.length} portions (${name})`;
        }).join(', ') + ' — hatch-highlighted matching the reference map\'s legend.'
      : q.maps.length > 1
      ? `${nUnion} portions affected across all years (highlighted yellow). Pick a year to isolate it (red) and open its map.`
      : (nUnion > 0
          ? `${nUnion} portions affected (highlighted yellow). Open the reference map below.`
          : `Open the reference map below. (No portion highlight for this question — see PDF.)`);
  document.getElementById('topbarDesc').textContent =
    (q.desc ? q.desc + ' — ' : '') + countMsg;

  const docBtn = document.getElementById('topbarDoc');
  let row = document.getElementById('topbarMulti');
  if(row){ row.innerHTML=''; row.style.display='none'; }
  const link = document.getElementById('staticMapLink');
  if(link) link.style.display = 'none';

  if(q.maps.length === 1){
    // single map: show its portions (already yellow) + a direct PDF link
    docBtn.style.display='inline-block';
    docBtn.textContent='View reference map (PDF)';
    docBtn.href = q.maps[0].file;
  } else {
    docBtn.style.display='none';
    if(!row){
      row = document.createElement('div');
      row.id='topbarMulti';
      row.style.cssText='display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;';
      bar.appendChild(row);
    }
    row.style.display='flex';
    q.maps.forEach(m => {
      const b = document.createElement('button');
      b.className = 'year-btn';
      b.textContent = m.label + (m.note ? ' ⚠' : '');
      if(m.note){ b.title = m.note; b.classList.add('year-btn-warn'); }
      b.addEventListener('click', () => selectMap(q, m, b));
      row.appendChild(b);
    });
  }
}

function selectMap(q, m, btn){
  // re-apply yellow to the whole union, then red for just this map
  clearHighlights();
  highlight(unionPortions(q), YELLOW_STYLE);
  const ids = MAP_PORTIONS[m.file] || [];
  highlight(ids, RED_STYLE);

  document.querySelectorAll('.year-btn').forEach(n=>n.classList.remove('year-btn-active'));
  btn.classList.add('year-btn-active');

  // show the static-map link
  let link = document.getElementById('staticMapLink');
  if(!link){
    link = document.createElement('a');
    link.id = 'staticMapLink';
    link.className = 'doc-link';
    link.target = '_blank'; link.rel = 'noopener';
    link.style.marginTop = '8px';
    link.style.display = 'inline-block';
    document.getElementById('topbar').appendChild(link);
  }
  if(m.note){
    link.textContent = `${m.label} map — portions unavailable (${m.note})`;
    link.href = m.file;
    link.style.display = 'inline-block';
    document.getElementById('topbarDesc').textContent =
      `${m.label}: this map's source layer is mis-projected in the gpkg, so no portions are highlighted for it. The PDF still opens.`;
  } else {
    link.textContent = `Open ${m.label} static map (PDF) →`;
    link.href = m.file;
    link.style.display = 'inline-block';
    document.getElementById('topbarDesc').textContent =
      `${m.label}: ${ids.length} portions highlighted red; other years remain yellow.`;
  }
}

/* =========================================================================
   CHAT ASSISTANT — local, rule-based Q&A over QUESTIONS/MAP_PORTIONS/parcels
   already loaded on this page. No external API calls, no keys: it just runs
   the same lookups a user could do by clicking the sidebar/map themselves.
   ========================================================================= */

const QUESTION_KEYWORDS = {
  graveyard:'a2_graveyards', grave:'a2_graveyards', burial:'a2_graveyards',
  cultivat:'b4_cultivation',
  occupat:'a6_occupation', homestead:'a6_occupation',
  trust:'a4_trust_state', 'state ownership':'a4_trust_state',
  madlala:'a5_madlala',
  khoshwane:'a5_khoshwane',
  ingonyama:'a8_ingonyama', ingoyama:'a8_ingonyama',
  beneficiary:'beneficiary',
  grazing:'grazing_access', 'access route':'grazing_access',
  spring:'grazing_access', 'water point':'grazing_access',
};
const CHAT_STOPWORDS = new Set(['the','a','an','is','are','of','on','in','to','for','and','or',
  'any','has','have','does','do','which','what','where','portion','portions','claim','show',
  'find','tell','about','me','please']);

function matchQuestions(lower){
  const codeM = lower.match(/\b([ab])[\s-]?(\d)\b/i);
  if(codeM){
    const code = (codeM[1]+codeM[2]).toUpperCase();
    const byCode = QUESTIONS.filter(q => q.trigger.toUpperCase() === code);
    if(byCode.length) return byCode;
  }
  const idHits = new Set();
  Object.entries(QUESTION_KEYWORDS).forEach(([kw,id]) => { if(lower.includes(kw)) idHits.add(id); });
  if(idHits.size) return QUESTIONS.filter(q => idHits.has(q.id));

  const words = lower.replace(/[^a-z0-9\s]/g,' ').split(/\s+/)
    .filter(w => w.length > 3 && !CHAT_STOPWORDS.has(w));
  if(!words.length) return [];
  const scored = QUESTIONS.map(q => {
    const hay = (q.title + ' ' + q.desc).toLowerCase();
    const score = words.reduce((s,w) => s + (hay.includes(w) ? 1 : 0), 0);
    return { q, score };
  }).filter(x => x.score >= 2).sort((a,b) => b.score - a.score);
  return scored.slice(0,3).map(x => x.q);
}

function searchParcels(lower){
  const lpiM = lower.match(/n0et\d{17}/i);
  if(lpiM){
    const hit = PARCEL_FEATURES.filter(f => f.properties.lpi_id.toLowerCase() === lpiM[0]);
    if(hit.length) return hit;
  }
  const numM = lower.match(/\b(?:ptn|portion|pt|rem|remainder|re)\.?\s*(\d+)\b/);
  let candidates = PARCEL_FEATURES;
  if(numM){
    const num = parseInt(numM[1], 10);
    candidates = candidates.filter(f => parseInt(f.properties.lpi_id.slice(-5), 10) === num);
  }
  const farmWords = lower
    .replace(/\b(?:ptn|portion|pt|rem|remainder|re)\.?\s*\d+\b/g, ' ')
    .replace(/[^a-z0-9\s]/g, ' ').split(/\s+/)
    .filter(w => w.length > 2 && !CHAT_STOPWORDS.has(w) && !['ptn','pt','rem','farm'].includes(w));
  if(farmWords.length){
    const farmFiltered = candidates.filter(f => {
      const fn = f.properties.farm_name.toLowerCase();
      return farmWords.some(w => fn.includes(w));
    });
    if(farmFiltered.length) candidates = farmFiltered;
    else if(!numM) return []; // farm words given but matched nothing, and no portion number to fall back on
  }
  if(!numM && !farmWords.length) return [];
  return candidates;
}

function dedupeByLpi(feats){
  const seen = new Set(), out = [];
  feats.forEach(f => { if(!seen.has(f.properties.lpi_id)){ seen.add(f.properties.lpi_id); out.push(f); } });
  return out;
}

function addMessage(role, text, chips){
  const wrap = document.createElement('div');
  wrap.className = 'chat-msg chat-msg-' + role;
  const inner = document.createElement('div');
  const bubble = document.createElement('div');
  bubble.className = 'chat-bubble';
  bubble.textContent = text;
  inner.appendChild(bubble);
  if(chips && chips.length){
    const chipRow = document.createElement('div');
    chipRow.className = 'chat-chips';
    chips.forEach(c => {
      const b = document.createElement('button');
      b.type = 'button';
      b.className = 'chat-chip';
      b.textContent = c.label;
      b.addEventListener('click', c.onClick);
      chipRow.appendChild(b);
    });
    inner.appendChild(chipRow);
  }
  wrap.appendChild(inner);
  const messages = document.getElementById('chatMessages');
  messages.appendChild(wrap);
  messages.scrollTop = messages.scrollHeight;
}

function runQuestionChat(q){
  document.querySelectorAll('.q-item').forEach(n => n.classList.remove('active'));
  const el = document.querySelector(`.q-item[data-qid="${q.id}"]`);
  if(el) el.classList.add('active');
  showQuestion(q);
  const n = unionPortions(q).length;
  const label = q.trigger !== '—' ? `Trigger ${q.trigger}` : 'This dataset';
  addMessage('bot', `${label}: ${q.title}\n\n${n} portion${n===1?'':'s'} highlighted on the map` +
    (q.maps.length > 1 ? ` across ${q.maps.length} years — pick a year in the top bar to isolate it.` : '.'));
}

function selectParcelChat(props){
  const arr = layersByLpi[props.lpi_id];
  if(arr && arr.length){
    openDossier(props, arr[0]);
    try{ map.fitBounds(L.featureGroup(arr).getBounds(), { padding:[60,60], maxZoom:16 }); }catch(e){}
  }
}

function describeParcelChat(f){
  const p = f.properties;
  selectParcelChat(p);
  const areaHa = p.area_m2 ? (p.area_m2/10000).toFixed(2) + ' ha' : 'unknown area';
  addMessage('bot', `${p.portion_id} — ${areaHa}, status: ${p.status||'—'}, owner: ${p.current_owner||'—'} (${p.owner_type||'—'}).`);
}

function handleChatQuery(raw){
  const text = raw.trim();
  if(!text) return;
  addMessage('user', text);
  const lower = text.toLowerCase();

  if(/^(help|hi|hello|hey)\b/.test(lower) || /what can (you|this) (do|answer)/.test(lower)){
    addMessage('bot',
      'I can look up:\n' +
      '• a trigger question — e.g. "A2", "graveyards", "grazing access"\n' +
      '• a portion or farm — e.g. "portion 12", "Longwood", or a 21-digit LPI key\n\n' +
      'Try one of these trigger questions:',
      QUESTIONS.map(q => ({ label: q.trigger !== '—' ? q.trigger : q.id, onClick: () => runQuestionChat(q) })));
    return;
  }

  const qMatches = matchQuestions(lower);
  const parcelHits = dedupeByLpi(searchParcels(lower));

  if(qMatches.length === 1 && parcelHits.length === 0){
    runQuestionChat(qMatches[0]);
    return;
  }
  if(qMatches.length > 1){
    addMessage('bot', `I found ${qMatches.length} matching trigger questions — which one?`,
      qMatches.map(q => ({ label: (q.trigger !== '—' ? q.trigger + ': ' : '') + q.title.split(' — ')[0], onClick: () => runQuestionChat(q) })));
    return;
  }
  if(parcelHits.length === 1){
    describeParcelChat(parcelHits[0]);
    return;
  }
  if(parcelHits.length > 1){
    if(parcelHits.length > 8){
      addMessage('bot', `That matches ${parcelHits.length} portions — try adding a farm name or portion number to narrow it down (e.g. "portion 3 Longwood").`);
    } else {
      addMessage('bot', `Found ${parcelHits.length} matching portions:`,
        parcelHits.map(f => ({ label: f.properties.portion_id, onClick: () => describeParcelChat(f) })));
    }
    return;
  }
  addMessage('bot', 'I couldn\'t match that to a trigger question or a portion/farm. Try a trigger code (A1–A8, B4), a keyword like "graveyards" or "grazing", or a portion/farm name like "portion 12" or "Longwood". Type "help" for a list.');
}

const chatFab = document.getElementById('chatFab');
const chatPanel = document.getElementById('chatPanel');
chatFab.addEventListener('click', () => {
  chatPanel.classList.add('open');
  document.getElementById('chatInput').focus();
  if(!chatPanel.dataset.greeted){
    chatPanel.dataset.greeted = '1';
    addMessage('bot', 'Ask me about a trigger question (e.g. "graveyards", "A2") or a specific portion/farm (e.g. "portion 12", "Longwood"). Type "help" any time.');
  }
});
document.getElementById('chatClose').addEventListener('click', () => chatPanel.classList.remove('open'));
document.getElementById('chatForm').addEventListener('submit', (e) => {
  e.preventDefault();
  const input = document.getElementById('chatInput');
  const val = input.value;
  input.value = '';
  handleChatQuery(val);
});
</script>
